name: pacely
description: Race Your Ghost — A competitive running app.
version: 1.0.0+1

environment:
  sdk: "^3.11.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase ────────────────────────────────────────────────────────────────
  supabase_flutter: ^2.3.0

  # ── Auth ─────────────────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # ── Maps & Location ──────────────────────────────────────────────────────────
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0

  # ── State & Navigation ───────────────────────────────────────────────────────
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0

  # ── Payments ─────────────────────────────────────────────────────────────────
  in_app_purchase: ^3.1.13

  # ── UI ───────────────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # ── Utils ────────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true